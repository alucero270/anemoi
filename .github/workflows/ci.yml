name: ci

on:
  push:
    branches:
      - main
      - "issue/**"
  pull_request:

jobs:
  commit-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PR branch name
        if: github.event_name == 'pull_request'
        run: bash ./.github/scripts/validate-branch-name.sh "${{ github.head_ref }}"
      - name: Validate push branch name
        if: github.event_name == 'push'
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          if [ "$branch" != "main" ]; then
            bash ./.github/scripts/validate-branch-name.sh "$branch"
          fi
      - name: Validate commit messages in pull request
        if: github.event_name == 'pull_request'
        run: |
          git rev-list --reverse "${{ github.event.pull_request.base.sha }}..${{ github.sha }}" |
          while read -r commit; do
            git log --format=%B -n 1 "$commit" > .git/COMMIT_EDITMSG
            bash ./.github/scripts/validate-commit-message.sh .git/COMMIT_EDITMSG
          done
      - name: Validate commit messages in push
        if: github.event_name == 'push'
        run: |
          commits="$(jq -r '.commits[].id' "$GITHUB_EVENT_PATH")"
          if [ -z "$commits" ]; then
            commits="${GITHUB_SHA}"
          fi
          printf '%s\n' "$commits" |
          while read -r commit; do
            [ -n "$commit" ] || continue
            git log --format=%B -n 1 "$commit" > .git/COMMIT_EDITMSG
            bash ./.github/scripts/validate-commit-message.sh .git/COMMIT_EDITMSG
          done

  build-test:
    needs: commit-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Guard (test-quality lint)
        run: cargo run -p anemoi-guard -- crates
