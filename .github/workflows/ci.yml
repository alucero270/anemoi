name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Anemoi.sln
      - name: Build
        run: dotnet build Anemoi.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test Anemoi.sln --no-build --configuration Release
