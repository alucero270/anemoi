# Anemoi Configuration for Pi Integration
# This config uses mock runtime by default - no Ollama/llama-swap required
# For real runtime integration, see config/anemoi.llama-swap.example.yaml

domains:
  coding:
    rosters:
      - small_swarm
      - large_models

residency_groups:
  small_swarm:
    purpose:
      - interactive coding continuity
    keep_hot: true
    allow_background_load: true
    models:
      - qwen9b
      - granite8b
      - qwen122b
      - minimax

  large_models:
    purpose:
      - higher quality coding synthesis
    keep_hot: false
    allow_background_load: true
    models:
      - qwen35_a3b
      - qwen122b
      - minimax

models:
  qwen9b:
    family: qwen
    parameter_class: 9b
    context_window: 32768
    vram_required_mb: 9000
    ram_required_mb: 12000
    cold_load_estimate_ms: 18000
    supported_runtimes:
      - mock

  granite8b:
    family: granite
    parameter_class: 8b
    context_window: 8192
    vram_required_mb: 8000
    ram_required_mb: 10000
    cold_load_estimate_ms: 15000
    supported_runtimes:
      - mock

  qwen35_a3b:
    family: qwen
    parameter_class: 35b
    context_window: 32768
    vram_required_mb: 30000
    ram_required_mb: 45000
    cold_load_estimate_ms: 45000
    supported_runtimes:
      - mock

  qwen122b:
    family: qwen
    parameter_class: 122b
    context_window: 32768
    vram_required_mb: 140000
    ram_required_mb: 220000
    cold_load_estimate_ms: 120000
    supported_runtimes:
      - mock

  minimax:
    family: minimax
    parameter_class: 70b
    context_window: 128000
    vram_required_mb: 180000
    ram_required_mb: 280000
    cold_load_estimate_ms: 90000
    supported_runtimes:
      - mock

runtimes:
  mock:
    adapter: mock
    initial_residents:
      - model_id: qwen9b
        state: hot_gpu
        vram_mb: 9000
        ram_mb: 12000

continuity:
  keep_small_worker_hot: true
  background_load: true
  max_blank_wait_ms: 1500
  prefer_degraded_response_over_silence: true
