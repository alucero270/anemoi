# Anemoi live config profile for llama-swap validation.
#
# The base_url below is a placeholder. Set ANEMOI_LLAMA_SWAP_BASE_URL as an
# environment variable when running the daemon or CLI; Anemoi expands ${VAR}
# patterns from the environment at load time.
#
# Optional auth token: set ANEMOI_LLAMA_SWAP_AUTH_TOKEN and reference it as
# ${ANEMOI_LLAMA_SWAP_AUTH_TOKEN} in the runtime entry below.
#
# No secrets or host-only paths are committed here.

domains:
  coding:
    rosters:
      - small_swarm
      - large_models

residency_groups:
  small_swarm:
    purpose:
      - interactive coding continuity
    keep_hot: true
    allow_background_load: true
    models:
      - qwen9b

  large_models:
    purpose:
      - higher quality coding synthesis
    keep_hot: false
    allow_background_load: true
    models:
      - qwen35_a3b

models:
  qwen9b:
    family: qwen
    parameter_class: 9b
    context_window: 32768
    vram_required_mb: 9000
    ram_required_mb: 12000
    cold_load_estimate_ms: 18000
    supported_runtimes:
      - llama_swap

  qwen35_a3b:
    family: qwen
    parameter_class: 35b
    context_window: 32768
    vram_required_mb: 30000
    ram_required_mb: 45000
    cold_load_estimate_ms: 45000
    supported_runtimes:
      - llama_swap

runtimes:
  llama_swap:
    adapter: llama_swap
    base_url: "${ANEMOI_LLAMA_SWAP_BASE_URL}"
    auth_token: "${ANEMOI_LLAMA_SWAP_AUTH_TOKEN}"

continuity:
  keep_small_worker_hot: true
  background_load: true
  max_blank_wait_ms: 1500
  prefer_degraded_response_over_silence: true
