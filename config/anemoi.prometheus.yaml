# Anemoi config for prometheus — real llama-swap runtime.
#
# Set before running:
#   export ANEMOI_LLAMA_SWAP_BASE_URL=http://172.17.0.1:8085
#   export ANEMOI_LLAMA_SWAP_AUTH_TOKEN=LOCAL
#   export ANEMOI_CONFIG=/home/alex/anemoi/config/anemoi.prometheus.yaml
#   export ANEMOI_BIND=127.0.0.1:7070
#
# No secrets committed here.
#
# The coding domain uses a live roster: anemoi reads the model list directly
# from llama-swap at runtime and synthesises candidate profiles on the fly.
# No manual roster maintenance required — add or remove models in llama-swap
# and anemoi picks them up automatically.

domains:
  coding:
    live_roster: llama_swap

runtimes:
  llama_swap:
    adapter: llama_swap
    base_url: "${ANEMOI_LLAMA_SWAP_BASE_URL}"
    auth_token: "${ANEMOI_LLAMA_SWAP_AUTH_TOKEN}"

continuity:
  keep_small_worker_hot: true
  background_load: true
  max_blank_wait_ms: 2000
  prefer_degraded_response_over_silence: true
