# Anemoi live config profile for llama-swap validation.
# Routes through Traefik reverse proxy at llama-swap.home.arpa
# Auth: Bearer LOCAL (via Traefik middleware)

domains:
  coding:
    rosters:
      - small_swarm
      - large_models

residency_groups:
  small_swarm:
    purpose:
      - interactive coding continuity
    keep_hot: true
    allow_background_load: true
    models:
      - qwen3.5-9b
      - qwen3.5-9b-gpu
      - granite-4.1-8b
      - granite-4.1-8b-gpu
      - gemma-4-26b-a4b-it

  large_models:
    purpose:
      - higher quality coding synthesis
    keep_hot: false
    allow_background_load: true
    models:
      - qwen3.6-35b-a3b-mtp
      - qwen3.6-35b-a3b-mtp-co
      - qwen3.5-122b-a10b-mtp
      - nemotron-udiq4-256k

models:
  # --- Qwen Family ---
  
  qwen3.5-9b:
    family: qwen
    parameter_class: 9b
    context_window: 32768
    vram_required_mb: 9000
    ram_required_mb: 12000
    cold_load_estimate_ms: 18000
    supported_runtimes:
      - llama_swap

